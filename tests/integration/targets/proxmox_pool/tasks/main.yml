- name: Proxmox VE pool and pool membership management
  tags: ["pool"]
  environment: "{{ environment_auth_vars }}"

  block:
    - name: Make sure poolid parameter is not missing
      proxmox_pool:
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'missing required arguments: poolid' in result.msg"

    - name: Create pool (Check)
      proxmox_pool:
        poolid: "{{ poolid }}"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create pool
      proxmox_pool:
        poolid: "{{ poolid }}"
      register: result

    - assert:
        that:
          - result is changed
          - result is success
          - result.poolid == "{{ poolid }}"

    - name: Delete pool (Check)
      proxmox_pool:
        poolid: "{{ poolid }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Delete non-existing pool should do nothing
      proxmox_pool:
        poolid: "non-existing-poolid"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Deletion of non-empty pool fails
      block:
        - name: Add storage into pool
          proxmox_pool_member:
            poolid: "{{ poolid }}"
            member: "{{ member }}"
            type: "{{ member_type }}"
          diff: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "'{{ member }}' in result.diff.after.members"

        - name: Add non-existing storage into pool should fail
          proxmox_pool_member:
            poolid: "{{ poolid }}"
            member: "non-existing-storage"
            type: "{{ member_type }}"
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'Storage non-existing-storage doesn\\'t exist in the cluster' in result.msg"

        - name: Delete non-empty pool
          proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'Please remove members from pool first.' in result.msg"

        - name: Delete storage from the pool
          proxmox_pool_member:
            poolid: "{{ poolid }}"
            member: "{{ member }}"
            type: "{{ member_type }}"
            state: absent
          register: result

        - assert:
            that:
              - result is success
              - result is changed

      rescue:
        - name: Delete storage from the pool if it is added
          proxmox_pool_member:
            poolid: "{{ poolid }}"
            member: "{{ member }}"
            type: "{{ member_type }}"
            state: absent
          ignore_errors: true

    - name: Delete pool
      proxmox_pool:
        poolid: "{{ poolid }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success
          - result.poolid == "{{ poolid }}"

  rescue:
    - name: Delete test pool if it is created
      proxmox_pool:
        poolid: "{{ poolid }}"
        state: absent
      ignore_errors: true
