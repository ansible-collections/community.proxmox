- name: Proxmox VE pool and pool membership management
  tags: ["pool"]
  environment: "{{ environment_auth_vars }}"

  block:
    - name: Ensure clean state before starting
      block:
        - name: Delete nested pool if left from previous run
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          ignore_errors: true

        - name: Delete test pool if left from previous run
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          ignore_errors: true

    - name: Pool lifecycle for base pool
      block:
        - name: Create pool in check mode
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not create pool
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Create pool
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - result.poolid == poolid

        - name: Create pool idempotently
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

    - name: Pool member lifecycle and reconciliation
      block:
        - name: Add storage member in check mode
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Verify check mode did not add storage member
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            state: absent
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success
              - "result.members | length == 0"

        - name: Add storage member
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Add storage member idempotently
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Remove storage member in check mode
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            state: absent
            members:
              - storage: "{{ member }}"
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "result.members | length == 0"

        - name: Verify check mode did not remove storage member
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Remove storage member
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            state: absent
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "result.members | length == 0"

        - name: Remove storage member idempotently
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            state: absent
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Add non-existing storage to pool fails
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "non-existing-storage"
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'non-existing-storage' in result.msg"

        - name: Add storage member for exclusive mode and delete guard checks
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Reconcile members to empty set with exclusive mode
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            exclusive: true
            members: []
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "result.members | length == 0"

        - name: Reconcile members to empty set idempotently
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            exclusive: true
            members: []
          register: result

        - assert:
            that:
              - result is not changed
              - result is success
              - "result.members | length == 0"

        - name: Add storage member again for non-empty delete guard
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Delete non-empty pool fails
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'Please remove members from pool first.' in result.msg"

        - name: Empty pool using exclusive mode before deletion
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            exclusive: true
            members: []
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "result.members | length == 0"

      rescue:
        - name: Best-effort cleanup of pool members after member test failure
          community.proxmox.proxmox_pool_member:
            poolid: "{{ poolid }}"
            exclusive: true
            members: []
          ignore_errors: true

    - name: Nested pool ID lifecycle
      block:
        - name: Create nested pool in check mode
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not create nested pool
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Create nested pool
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - result.poolid == nested_poolid

        - name: Create nested pool idempotently
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Add member to nested pool
          community.proxmox.proxmox_pool_member:
            poolid: "{{ nested_poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "{'storage': member} in result.members"

        - name: Add member to nested pool idempotently
          community.proxmox.proxmox_pool_member:
            poolid: "{{ nested_poolid }}"
            members:
              - storage: "{{ member }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Delete non-empty nested pool fails
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'Please remove members from pool first.' in result.msg"

        - name: Empty nested pool members with exclusive mode
          community.proxmox.proxmox_pool_member:
            poolid: "{{ nested_poolid }}"
            exclusive: true
            members: []
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - "result.members | length == 0"

        - name: Delete nested pool in check mode
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not delete nested pool
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Delete nested pool
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - result.poolid == nested_poolid

        - name: Delete nested pool idempotently
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

      rescue:
        - name: Best-effort cleanup of nested pool after failure
          community.proxmox.proxmox_pool:
            poolid: "{{ nested_poolid }}"
            state: absent
          ignore_errors: true

    - name: Delete base pool lifecycle
      block:
        - name: Delete base pool in check mode
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not delete base pool
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Delete base pool
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is changed
              - result is success
              - result.poolid == poolid

        - name: Delete non-existing pool idempotently
          community.proxmox.proxmox_pool:
            poolid: "{{ poolid }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

  rescue:
    - name: Remove nested pool after top-level failure
      community.proxmox.proxmox_pool:
        poolid: "{{ nested_poolid }}"
        state: absent
      ignore_errors: true

    - name: Delete test pool after top-level failure
      community.proxmox.proxmox_pool:
        poolid: "{{ poolid }}"
        state: absent
      ignore_errors: true
