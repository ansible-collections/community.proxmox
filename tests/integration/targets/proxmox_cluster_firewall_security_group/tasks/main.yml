- name: Cluster firewall security group management
  tags: ["proxmox_cluster_firewall_security_group"]
  environment: "{{ environment_auth_vars }}"

  block:
    # -------------------------------------------------------------------------
    # Ensure clean state before starting
    # -------------------------------------------------------------------------

    - name: Delete security group if it exists from a previous run
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      ignore_errors: true

    # -------------------------------------------------------------------------
    # Create with rules in a single call
    # -------------------------------------------------------------------------

    - name: Create security group with rules in one shot (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Created with rules"
        rules:
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result.comment == "Created with rules"
          - result.rules | length == 1
          - result.rules[0].action == "ACCEPT"
          - result.rules[0].dport == "80"
          - result.rules[0].enabled == true

    - name: Create security group with rules in one shot
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Created with rules"
        rules:
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.comment == "Created with rules"
          - result.rules | length == 1
          - result.rules[0].type == "in"
          - result.rules[0].action == "ACCEPT"
          - result.rules[0].dport == "80"
          - result.rules[0].enabled == true

    - name: Delete security group to reset state
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent

    # -------------------------------------------------------------------------
    # Create — check mode
    # -------------------------------------------------------------------------

    - name: Create security group (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Managed by Ansible"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success
          - result.name == sg_name
          - result.comment == "Managed by Ansible"

    - name: Verify group was not actually created (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - "'does not exist' in result.msg"

    # -------------------------------------------------------------------------
    # Create — actual
    # -------------------------------------------------------------------------

    - name: Create security group
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Managed by Ansible"
      register: result

    - assert:
        that:
          - result is changed
          - result is success
          - result.name == sg_name
          - result.comment == "Managed by Ansible"
          - "'rules' not in result"

    - name: Create security group again (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Managed by Ansible"
      register: result

    - assert:
        that:
          - result is not changed
          - result.name == sg_name
          - result.comment == "Managed by Ansible"

    # -------------------------------------------------------------------------
    # Update comment
    # -------------------------------------------------------------------------

    - name: Update comment (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Updated comment"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result.comment == "Updated comment"

    - name: Update comment
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Updated comment"
      register: result

    - assert:
        that:
          - result is changed
          - result.comment == "Updated comment"

    - name: Update comment (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Updated comment"
      register: result

    - assert:
        that:
          - result is not changed

    # -------------------------------------------------------------------------
    # Rules — create
    # -------------------------------------------------------------------------

    - name: Add rules (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            comment: Allow HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
          - type: in
            action: ACCEPT
            comment: Allow HTTPS
            dest: 192.168.1.100
            dport: "443"
            proto: tcp
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 2
          - result.rules[0].action == "ACCEPT"
          - result.rules[0].dport == "80"
          - result.rules[1].dport == "443"

    - name: Add rules
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            comment: Allow HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
          - type: in
            action: ACCEPT
            comment: Allow HTTPS
            dest: 192.168.1.100
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 2
          - result.rules[0].type == "in"
          - result.rules[0].action == "ACCEPT"
          - result.rules[0].dport == "80"
          - result.rules[0].enabled == true
          - result.rules[1].dport == "443"

    - name: Add rules (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            comment: Allow HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
          - type: in
            action: ACCEPT
            comment: Allow HTTPS
            dest: 192.168.1.100
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules | length == 2

    # -------------------------------------------------------------------------
    # Rules — omitting rules param leaves rules unchanged
    # -------------------------------------------------------------------------

    - name: Update comment without touching rules
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        comment: "Restored comment"
      register: result

    - assert:
        that:
          - result is changed
          - result.comment == "Restored comment"
          - "'rules' not in result"

    # -------------------------------------------------------------------------
    # Rules — update in place
    # -------------------------------------------------------------------------

    - name: Update rule at position 0 in place
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            comment: Block HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
          - type: in
            action: ACCEPT
            comment: Allow HTTPS
            dest: 192.168.1.100
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules[0].action == "DROP"
          - result.rules[0].comment == "Block HTTP"
          - result.rules[1].action == "ACCEPT"

    - name: Update rule at position 0 (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            comment: Block HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
          - type: in
            action: ACCEPT
            comment: Allow HTTPS
            dest: 192.168.1.100
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed

    # -------------------------------------------------------------------------
    # Rules — prune (reduce count)
    # -------------------------------------------------------------------------

    - name: Prune to one rule (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            comment: Block HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Prune to one rule
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            comment: Block HTTP
            dest: 192.168.1.100
            dport: "80"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 1
          - result.rules[0].dport == "80"

    # -------------------------------------------------------------------------
    # Rules — clear all rules with empty list
    # -------------------------------------------------------------------------

    - name: Clear all rules (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules: []
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Clear all rules
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules: []
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 0

    - name: Clear all rules (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules: []
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules | length == 0

    # -------------------------------------------------------------------------
    # Rules — add a trailing rule (group already has 0 rules)
    # -------------------------------------------------------------------------

    - name: Add one rule to an empty group
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 1
          - result.rules[0].dport == "22"

    # -------------------------------------------------------------------------
    # Rules — check mode for in-place rule content change (same count, new action)
    # -------------------------------------------------------------------------

    - name: Update rule content in place (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            dport: "22"
            proto: tcp
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result.rules[0].action == "DROP"

    - name: Verify rule unchanged after check mode
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules | length == 1
          - result.rules[0].action == "ACCEPT"

    # -------------------------------------------------------------------------
    # Rules — append to grow list (1 → 3), including a type: out rule
    # -------------------------------------------------------------------------

    - name: Grow rule list from 1 to 3 (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 3
          - result.rules[2].type == "out"

    - name: Grow rule list from 1 to 3
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 3
          - result.rules[2].type == "out"

    - name: Grow rule list from 1 to 3 (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules | length == 3

    # -------------------------------------------------------------------------
    # Rules — disabled rule (enabled: false)
    # -------------------------------------------------------------------------

    - name: "Disable a rule (enabled: false)"
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
            enabled: false
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules[0].enabled == false
          - result.rules[1].enabled == true

    - name: "Disable a rule (idempotent)"
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            dport: "22"
            proto: tcp
            enabled: false
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules[0].enabled == false

    # -------------------------------------------------------------------------
    # Rules — optional fields (source, log)
    # -------------------------------------------------------------------------

    - name: Set rules with optional fields (source, log)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            source: 10.0.0.0/8
            dport: "22"
            proto: tcp
            log: info
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules[0].source == "10.0.0.0/8"
          - result.rules[0].log == "info"

    - name: Set rules with optional fields (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            source: 10.0.0.0/8
            dport: "22"
            proto: tcp
            log: info
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed

    # -------------------------------------------------------------------------
    # Rules — preserve omitted optional fields on in-place update
    # -------------------------------------------------------------------------

    - name: Update rule while omitting existing optional fields (source, log)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            dport: "22"
            proto: tcp
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is changed
          - result.rules[0].action == "DROP"
          - result.rules[0].source == "10.0.0.0/8"
          - result.rules[0].log == "info"

    - name: Omitted optional fields remain preserved (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: DROP
            dport: "22"
            proto: tcp
          - type: in
            action: ACCEPT
            dport: "80"
            proto: tcp
          - type: out
            action: ACCEPT
            dport: "443"
            proto: tcp
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules[0].source == "10.0.0.0/8"
          - result.rules[0].log == "info"

    # -------------------------------------------------------------------------
    # Rules — icmp_type API mapping and roundtrip
    # -------------------------------------------------------------------------

    - name: Clear rules before ICMP scenario
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules: []
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 0

    - name: Set ICMP rule with icmp_type
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            proto: icmp
            icmp_type: "echo-request"
      register: result

    - assert:
        that:
          - result is changed
          - result.rules | length == 1
          - result.rules[0].proto == "icmp"
          - result.rules[0].icmp_type == "echo-request"

    - name: Set ICMP rule with icmp_type (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        rules:
          - type: in
            action: ACCEPT
            proto: icmp
            icmp_type: "echo-request"
      register: result

    - assert:
        that:
          - result is not changed
          - result.rules | length == 1
          - result.rules[0].icmp_type == "echo-request"

    # -------------------------------------------------------------------------
    # Delete — check mode
    # -------------------------------------------------------------------------

    - name: Delete security group (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify group still exists after check mode delete
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
      register: result

    - assert:
        that:
          - result is not changed

    # -------------------------------------------------------------------------
    # Delete — actual
    # -------------------------------------------------------------------------

    - name: Delete security group
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success
          - result.name == sg_name

    - name: Delete non-existent security group (idempotent)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - "'does not exist' in result.msg"

    # -------------------------------------------------------------------------
    # State=absent check mode when group does not exist
    # -------------------------------------------------------------------------

    - name: Delete non-existent security group (check mode)
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is not changed
          - "'does not exist' in result.msg"

  rescue:
    - name: Delete test security group if it was created
      community.proxmox.proxmox_cluster_firewall_security_group:
        name: "{{ sg_name }}"
        state: absent
      ignore_errors: true
