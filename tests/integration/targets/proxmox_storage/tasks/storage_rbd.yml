- name: Proxmox VE - RBD Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create rbd storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create rbd storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update rbd storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        bwlimit: clone=1024,default=2048
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
          krbd: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update rbd storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        bwlimit: clone=1024,default=2048
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
          krbd: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update rbd storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        bwlimit: clone=1024,default=2048
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
          krbd: true
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) rbd storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) rbd storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) rbd storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
        disable: true
        rbd_options:
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          pool: ceph-external
          username: proxmox
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete rbd storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete rbd storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        type: rbd
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete rbd storage
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove rbd storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ rbd_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
