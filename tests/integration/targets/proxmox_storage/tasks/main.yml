- name: Proxmox VE storage management
  tags: ["storage"]
  environment: "{{ environment_auth_vars }}"

  block:
    - name: Ensure clean state before starting
      block:
        - name: Delete nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            state: absent
          ignore_errors: true

    - name: Storage lifecycle for nfs
      block:
        - name: Create storage in check mode
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
          diff: true
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not create storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Create nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Create nfs storage idempotently
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Update nfs storage in check mode
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
              preallocation: metadata
            update: true
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Update nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
              preallocation: metadata
            update: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Update nfs storage idempotently
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
              preallocation: metadata
            update: true
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Update (remove param) nfs storage in check mode
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
            update: true
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Update (remove param) nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
            update: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Update (remove params) nfs storage idempotently
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
            disable: true
            nfs_options:
              server: nfs.pve
              export: /pve
            update: true
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Update storage type in check mode
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: dir
            disable: true
            dir_options:
              path: /pve
            update: true
          check_mode: true
          ignore_errors: true
          register: result

        - assert:
            that:
              - result is failed
              - "'type can not be changed' in result.msg"

        - name: Delete nfs storage in check mode
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            state: absent
          check_mode: true
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Verify check mode did not delete nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            type: nfs
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

        - name: Delete nfs storage
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            state: absent
          register: result

        - assert:
            that:
              - result is changed
              - result is success

        - name: Remove nfs storage idempotently
          community.proxmox.proxmox_storage:
            name: "{{ nfs_storage }}"
            state: absent
          register: result

        - assert:
            that:
              - result is not changed
              - result is success

  rescue:
    - name: Remove nfs storage after top-level failure
      community.proxmox.proxmox_storage:
        name: "{{ nfs_storage }}"
        state: absent
      ignore_errors: true
