- name: Proxmox VE - LVM Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create lvm storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create lvm storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update lvm storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        bwlimit: clone=1024,default=2048
        lvm_options:
          vgname: "vgtest"
          saferemove: true
          saferemove_stepsize: 16
          saferemove_throughput: 4096
          snapshot_as_volume_chain: true
          tagged_only: false
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update lvm storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        bwlimit: clone=1024,default=2048
        lvm_options:
          vgname: "vgtest"
          saferemove: true
          saferemove_stepsize: 16
          saferemove_throughput: 4096
          snapshot_as_volume_chain: true
          tagged_only: false
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update lvm storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        bwlimit: clone=1024,default=2048
        lvm_options:
          vgname: "vgtest"
          saferemove: true
          saferemove_stepsize: 16
          saferemove_throughput: 4096
          snapshot_as_volume_chain: true
          tagged_only: false
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) lvm storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
          saferemove: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) lvm storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
          saferemove: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) lvm storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
        disable: true
        lvm_options:
          vgname: "vgtest"
          saferemove: true
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: nfs
        disable: true
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete lvm storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete lvm storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        type: lvm
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete lvm storage
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove lvm storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ lvm_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
