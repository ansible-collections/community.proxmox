- name: Proxmox VE - PBS Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          password: "SECRET"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create pbs storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          password: "SECRET"
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create pbs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          password: "SECRET"
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update pbs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          master_pubkey: 1
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update pbs storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          master_pubkey: 1
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update pbs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
          master_pubkey: 1
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) pbs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) pbs storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) pbs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
        disable: true
        pbs_options:
          server: "pbs.pve"
          datastore: "main"
          username: "archiver@pbs"
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete pbs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete pbs storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        type: pbs
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete pbs storage
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove pbs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ pbs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
