- name: Proxmox VE - CephFS Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create cephfs storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create cephfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update cephfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        bwlimit: clone=1024,default=2048
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
          fuse: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update cephfs storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        bwlimit: clone=1024,default=2048
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
          fuse: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update cephfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        bwlimit: clone=1024,default=2048
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
            - 10.1.1.22
          username: proxmox
          fs_name: cephfs
          fuse: true
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) cephfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
          fs_name: cephfs
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) cephfs storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
          fs_name: cephfs
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) cephfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
        disable: true
        cephfs_options:
          path: /mnt/pve/cephfs-external
          monhost:
            - 10.1.1.20
            - 10.1.1.21
          fs_name: cephfs
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete cephfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete cephfs storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        type: cephfs
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete cephfs storage
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove cephfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ cephfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
