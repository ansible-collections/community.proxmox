- name: Proxmox VE - Directory Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create dir storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create dir storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update dir storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        bwlimit: clone=1024,default=2048
        dir_options:
          path: "/tmp/{{ dir_storage }}"
          is_mountpoint: "/tmp/"
          format: qcow2
          prune_backups: keep-last=3,keep-daily=13,keep-yearly=9
          preallocation: off
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update dir storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        bwlimit: clone=1024,default=2048
        dir_options:
          path: "/tmp/{{ dir_storage }}"
          is_mountpoint: "/tmp/"
          format: qcow2
          prune_backups: keep-last=3,keep-daily=13,keep-yearly=9
          preallocation: off
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update dir storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        bwlimit: clone=1024,default=2048
        dir_options:
          path: "/tmp/{{ dir_storage }}"
          is_mountpoint: "/tmp/"
          format: qcow2
          prune_backups: keep-last=3,keep-daily=13,keep-yearly=9
          preallocation: off
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) dir storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) dir storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) dir storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
        disable: true
        dir_options:
          path: "/tmp/{{ dir_storage }}"
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: nfs
        disable: true
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete dir storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete dir storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        type: dir
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete dir storage
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove dir storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ dir_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
