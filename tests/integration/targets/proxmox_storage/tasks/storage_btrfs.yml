- name: Proxmox VE - BTRFS Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create btrfs storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create btrfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update btrfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
          nocow: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update btrfs storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
          nocow: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update btrfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
          is_mountpoint: /mnt/data2
          nocow: true
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) btrfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) btrfs storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) btrfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
        disable: true
        btrfs_options:
          path: /mnt/data2/pve-storage
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete btrfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete btrfs storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        type: btrfs
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete btrfs storage
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove btrfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ btrfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
