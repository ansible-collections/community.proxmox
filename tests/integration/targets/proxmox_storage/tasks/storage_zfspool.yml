- name: Proxmox VE - ZFS Pool Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create zfspool storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create zfspool storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update zfspool storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        bwlimit: clone=1024,default=2048
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
          blocksize: 4096
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update zfspool storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        bwlimit: clone=1024,default=2048
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
          blocksize: 4096
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update zfspool storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        bwlimit: clone=1024,default=2048
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
          blocksize: 4096
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) zfspool storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) zfspool storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) zfspool storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
        disable: true
        zfspool_options:
          pool: "tank/vmdata"
          sparse: true
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete zfspool storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete zfspool storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        type: zfspool
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete zfspool storage
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove zfspool storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfspool_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
