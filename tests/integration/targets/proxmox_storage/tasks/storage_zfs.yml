- name: Proxmox VE - ZFS Pool Storage
  block:
    - name: Create storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not create storage
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Create zfs storage
      community.proxmox.proxmox_storage:
        api_timeout: 30
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Create zfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update zfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        bwlimit: clone=1024,default=2048
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
          lio_tpg: "tpg1"
          sparse: true
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update zfs storage
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        bwlimit: clone=1024,default=2048
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
          lio_tpg: "tpg1"
          sparse: true
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update zfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        bwlimit: clone=1024,default=2048
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
          lio_tpg: "tpg1"
          sparse: true
        update: true
      diff: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update (remove param) zfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
        update: true
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove param) zfs storage
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
        update: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Update (remove params) zfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
        disable: true
        zfs_options:
          iscsiprovider: "LIO"
          pool: "tank"
          portal: "192.0.2.111"
          target: "iqn.2003-01.org.linux-iscsi.lio.x8664:sn.xxxxxxxxxxxx"
          blocksize: "4k"
        update: true
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Update storage type in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: dir
        disable: true
        dir_options:
          path: /pve
        update: true
      check_mode: true
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "'type can not be changed' in result.msg"

    - name: Delete zfs storage in check mode
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Verify check mode did not delete zfs storage
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        type: zfs
      register: result

    - assert:
        that:
          - result is not changed
          - result is success

    - name: Delete zfs storage
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is changed
          - result is success

    - name: Remove zfs storage idempotently
      community.proxmox.proxmox_storage:
        name: "{{ zfs_storage }}"
        state: absent
      register: result

    - assert:
        that:
          - result is not changed
          - result is success
